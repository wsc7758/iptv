<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV直播</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-size:16px;}
body{background:#111;color:#fff;display:flex;height:100vh;overflow:hidden;}
#list{width:320px;background:#222;overflow-y:auto;padding:10px;}
#player{flex:1;}
.channel{padding:12px 8px;margin:4px 0;background:#333;cursor:pointer;border-radius:4px;}
.channel:hover{background:#0066cc;}
.active{background:#0066cc;}
video{width:100%;height:100%;object-fit:contain;}
</style>
</head>
<body>
<div id="list"></div>
<div id="player">
<video id="video" controls autoplay></video>
</div>

<script>
const TXT_URL = "./iptv.txt";
const listDom = document.getElementById('list');
const video = document.getElementById('video');
let hls = null;

async function loadChannels(){
  try{
    const res = await fetch(TXT_URL);
    const text = await res.text();
    const lines = text.split('\n');
    lines.forEach(line=>{
      line = line.trim();
      if(!line) return;
      const arr = line.split(',');
      // 放宽判断，兼容两种格式：名称,,url / 名称,分类,url
      if(arr.length < 2) return;
      const name = arr[0];
      const src = arr[arr.length - 1];
      if(!src.startsWith("http")) return;
      const div = document.createElement('div');
      div.className = "channel";
      div.innerText = name;
      div.onclick=()=>playUrl(src,div);
      listDom.appendChild(div);
    })
  }catch(err){
    listDom.innerHTML = `<div style="padding:10px;color:red;">加载频道失败：${err.message}</div>`;
    console.error(err);
  }
}

function playUrl(url, dom){
  document.querySelectorAll('.channel').forEach(d=>d.classList.remove('active'));
  dom.classList.add('active');
  if(hls) hls.destroy();
  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }else if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src = url;
  }
  video.play().catch(e=>console.log("播放触发浏览器策略限制",e));
}
loadChannels();
</script>
</body>
</html>
