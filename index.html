<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV直播</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-size:16px;}
body{background:#111;color:#fff;display:flex;height:100vh;overflow:hidden;}
#list{width:320px;background:#222;overflow-y:auto;padding:10px;}
#player{flex:1;}
.channel{padding:12px 8px;margin:4px 0;background:#333;cursor:pointer;border-radius:4px;}
.channel:hover{background:#0066cc;}
.active{background:#0066cc;}
video{width:100%;height:100%;object-fit:contain;}
</style>
</head>
<body>
<div id="list"></div>
<div id="player">
<video id="video" controls autoplay></video>
</div>

<script>
const TXT_URL = "./iptv.txt";
const listDom = document.getElementById('list');
const video = document.getElementById('video');
let hls = null;

async function loadChannels(){
  const res = await fetch(TXT_URL);
  const text = await res.text();
  const lines = text.split('\n');
  lines.forEach(line=>{
    line = line.trim();
    if(!line) return;
    const arr = line.split(',');
    if(arr.length<3) return;
    const name = arr[0];
    const src = arr[2];
    const div = document.createElement('div');
    div.className = "channel";
    div.innerText = name;
    div.onclick=()=>playUrl(src,div);
    listDom.appendChild(div);
  })
}

function playUrl(url, dom){
  document.querySelectorAll('.channel').forEach(d=>d.classList.remove('active'));
  dom.classList.add('active');
  if(hls) hls.destroy();
  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }else if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src = url;
  }
  video.play();
}
loadChannels();
</script>
</body>
</html>
